# Apache reverse-proxy for serving Jeezlord under jackbulmer.co.uk/jeezlord/
# on a cPanel/WHM box, WITHOUT disturbing the existing root site.
#
# These directives are INCLUDED inside the domain's existing <VirtualHost> by
# cPanel's userdata-include mechanism, so they survive `rebuildhttpdconf`.
# Do NOT wrap them in <VirtualHost> — cPanel does that.
#
# Install (replace CPUSER with the cPanel account that owns jackbulmer.co.uk;
# find it with:  whoami on the account, or  grep -rl jackbulmer.co.uk \
#   /etc/apache2/conf.d/userdata 2>/dev/null ):
#
#   mkdir -p /etc/apache2/conf.d/userdata/std/2_4/CPUSER/jackbulmer.co.uk
#   mkdir -p /etc/apache2/conf.d/userdata/ssl/2_4/CPUSER/jackbulmer.co.uk
#   cp deploy/cpanel/jeezlord.conf \
#      /etc/apache2/conf.d/userdata/std/2_4/CPUSER/jackbulmer.co.uk/jeezlord.conf
#   cp deploy/cpanel/jeezlord.conf \
#      /etc/apache2/conf.d/userdata/ssl/2_4/CPUSER/jackbulmer.co.uk/jeezlord.conf
#   /scripts/ensure_vhost_includes --user=CPUSER
#   /scripts/rebuildhttpdconf
#   systemctl restart httpd        # or: /usr/local/cpanel/scripts/restartsrv_httpd
#
# Requires mod_proxy + mod_proxy_http + mod_proxy_wstunnel (EasyApache4 package
# ea-apache24-mod_proxy_wstunnel). Verify with:  httpd -M | grep proxy

# Send the bare path to the trailing-slash form. The client derives its asset
# base and WebSocket path from the directory of location.pathname, so it MUST
# be loaded as "/jeezlord/" (with slash), else assets + /ws resolve at root.
RedirectMatch ^/jeezlord$ /jeezlord/

ProxyPreserveHost On

# WebSocket endpoint first (more specific). mod_proxy_wstunnel handles the
# Upgrade handshake. The path is rewritten to /ws because the Node WebSocketServer
# matches exactly path:'/ws' (server/net/wsServer.ts).
ProxyPass        /jeezlord/ws  ws://127.0.0.1:8081/ws  retry=0
ProxyPassReverse /jeezlord/ws  ws://127.0.0.1:8081/ws

# Everything else under /jeezlord/ -> Node's static client server, prefix stripped
# (so /jeezlord/bundle.js is served as /bundle.js from the client/ dir).
ProxyPass        /jeezlord/    http://127.0.0.1:8081/  retry=0
ProxyPassReverse /jeezlord/    http://127.0.0.1:8081/
